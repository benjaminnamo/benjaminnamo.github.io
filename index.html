      var typed = new Typed('#typed-text', {

  <section id="intro">
    <div class="container">

    </div>
  </section>

  <section id="experience">
    <div class="container">
      <h2>Experience</h2>
      <!-- Add your experience details here -->
    </div>
  </section>

  <section id="projects">
    <div class="container">
      <h2>Projects</h2>
      <!-- Add your project details here -->
    </div>
  </section>

  <footer>
    <p>&copy; 2023 My Portfolio</p>
  </footer>
</body>
</html>
